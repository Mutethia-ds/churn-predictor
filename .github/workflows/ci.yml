name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install ruff black
      - name: Ruff check
        run: ruff check .
      - name: Black check
        run: black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: churn_db
          POSTGRES_USER: churn_user
          POSTGRES_PASSWORD: change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U churn_user -d churn_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Copy env file
        run: cp .env.example .env
      - name: Generate synthetic data
        run: python -m churn.data.generate_data
      - name: Validate data with Great Expectations
        run: python -m churn.data.validate_data
      - name: Run unit tests
        run: pytest tests/unit -v
      - name: Train model (needed for integration tests)
        run: python -m churn.models.train_sklearn
      - name: Run integration tests
        run: pytest tests/integration -v

  docs:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material
      - name: Build docs
        run: mkdocs build --strict
      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
